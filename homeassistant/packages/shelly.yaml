# Shelly devices should be integrated locally. These templates act as clean
# placeholders for later SG-Ready and relay logic.

template:
  - binary_sensor:
      - name: SG Ready Contact 1
        unique_id: sg_ready_contact_1
        state: "{{ is_state('switch.shelly_pro_1_relay', 'on') }}"
        availability: "{{ states('switch.shelly_pro_1_relay') not in ['unknown', 'unavailable'] }}"
      - name: SG Ready Contact 2
        unique_id: sg_ready_contact_2
        state: "{{ is_state('switch.shelly_pro_1_relay_2', 'on') }}"
        availability: "{{ states('switch.shelly_pro_1_relay_2') not in ['unknown', 'unavailable'] }}"
      - name: Shelly Pro 1 Available
        unique_id: shelly_pro_1_available
        state: "{{ states('switch.shelly_pro_1_relay') not in ['unknown', 'unavailable'] }}"
  - sensor:
      - name: Shelly Relay State
        unique_id: shelly_relay_state_text
        state: "{{ states('switch.shelly_pro_1_relay') }}"

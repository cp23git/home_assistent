# Balcony PV is treated as a separate producer because the Growatt system does
# not know about it. This package now models the Deye 800 W inverter and the
# 860 W balcony set as one local producer with a safe manual fallback.

input_select:
  balcony_pv_data_source:
    name: Balcony PV Data Source
    options:
      - deye_local
      - external_meter
      - estimated
    initial: estimated
    icon: mdi:solar-power

input_number:
  balcony_pv_module_nameplate_power_w:
    name: Balcony PV Module Nameplate Power
    min: 0
    max: 2000
    step: 1
    unit_of_measurement: W
    icon: mdi:solar-panel
  balcony_pv_inverter_limit_w:
    name: Balcony PV Inverter Limit
    min: 0
    max: 1000
    step: 1
    unit_of_measurement: W
    icon: mdi:current-ac
  balcony_pv_estimated_power_w:
    name: Balcony PV Estimated Power
    min: 0
    max: 800
    step: 1
    unit_of_measurement: W
    icon: mdi:solar-power

template:
  - sensor:
      - name: Balcony PV Power
        unique_id: balcony_pv_power_w
        state: >
          {% set source = states('input_select.balcony_pv_data_source') %}
          {% set measured = states('sensor.balcony_pv_power_raw') %}
          {% if source == 'estimated' or measured in ['unknown', 'unavailable', 'none', ''] %}
            {{ states('input_number.balcony_pv_estimated_power_w') | float(0) | round(0) }}
          {% else %}
            {{ measured | float(0) | round(0) }}
          {% endif %}
        unit_of_measurement: W
        device_class: power
        state_class: measurement

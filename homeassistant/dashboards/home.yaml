title: Zuhause
views:
  - title: Ueberblick
    path: home
    icon: mdi:home-analytics
    type: sections
    max_columns: 3
    badges:
      - entity: sensor.fnpaf5n02h_ausgangsleistung
      - entity: sensor.pc_leistung
      - entity: switch.smartlife_primary_outlet
      - entity: cover.meross_garage_door
    sections:
      - type: grid
        cards:
          - type: markdown
            content: >
              ## Zuhause im Blick

              Schnellzugriff auf Tor, Steckdose und Energie mit den wichtigsten
              Werten direkt oben.
          - type: heading
            heading: Schnellzugriff
          - type: button
            name: Garagentor oeffnen
            icon: mdi:garage-open
            entity: cover.meross_garage_door
            tap_action:
              action: call-service
              service: cover.open_cover
              target:
                entity_id: cover.meross_garage_door
            hold_action:
              action: more-info
            show_state: false
          - type: tile
            entity: switch.smartlife_primary_outlet
            name: SmartLife Steckdose
          - type: tile
            entity: sensor.fnpaf5n02h_ausgangsleistung
            name: Balkon PV
          - type: tile
            entity: sensor.1_warmepumpe_wasser_leistung
            name: Waermepumpe
      - type: grid
        cards:
          - type: heading
            heading: Energie auf einen Blick
          - type: tile
            entity: sensor.fnpaf5n02h_eigene_leistung
            name: Eigene Leistung
          - type: tile
            entity: sensor.fnpaf5n02h_ladezustand_soc
            name: Batterie SoC
          - type: tile
            entity: sensor.fnpaf5n02h_lokale_lastleistung
            name: Lokale Last
          - type: tile
            entity: sensor.fnpaf5n02h_bezugsleistung
            name: Netzbezug
          - type: tile
            entity: sensor.fnpaf5n02h_einspeiseleistung
            name: Netzeinspeisung
          - type: tile
            entity: sensor.solarman_inverter_total_production
            name: Gesamtproduktion
      - type: grid
        cards:
          - type: heading
            heading: Verlauf
          - type: history-graph
            title: Leistung letzte 24 Stunden
            hours_to_show: 24
            entities:
              - sensor.fnpaf5n02h_ausgangsleistung
              - sensor.pc_leistung
              - sensor.1_warmepumpe_wasser_leistung
              - sensor.fnpaf5n02h_lokale_lastleistung

title: Energie
views:
  - title: Energie
    path: energie
    icon: mdi:solar-power
    type: sections
    max_columns: 3
    badges:
      - entity: sensor.total_home_supply_w
      - entity: sensor.total_home_generation_w
      - entity: sensor.home_battery_soc_percent
      - entity: sensor.home_grid_import_w
    sections:
      - type: grid
        cards:
          - type: markdown
            content: >
              ## Energiefluss

              Die Seite zeigt die drei Erzeuger zusammen, dazu Verbrauch,
              Netzfluss und Batteriestand in einer ruhigen, klaren Ansicht.
          - type: heading
            heading: Uebersicht
          - type: tile
            entity: sensor.total_home_supply_w
            name: Alle Quellen
          - type: tile
            entity: sensor.total_home_generation_w
            name: Eigene Erzeugung
          - type: tile
            entity: sensor.home_pv_surplus_w
            name: PV Ueberschuss
          - type: tile
            entity: sensor.home_grid_import_w
            name: Netzbezug
          - type: tile
            entity: sensor.home_grid_export_w
            name: Netzeinspeisung
          - type: tile
            entity: sensor.home_battery_soc_percent
            name: Batterie SoC
      - type: grid
        cards:
          - type: heading
            heading: Energiequellen
          - type: entities
            entities:
              - entity: sensor.growatt_pv_power_w
                name: Growatt PV
              - entity: sensor.balcony_pv_power_w
                name: Balkon PV
              - entity: sensor.home_heatpump_consumption_w
                name: Waermepumpe
              - entity: sensor.total_home_consumption_w
                name: Hausverbrauch
      - type: grid
        cards:
          - type: heading
            heading: Verlauf
          - type: history-graph
            title: Leistung letzte 24 Stunden
            hours_to_show: 24
            entities:
              - sensor.total_home_supply_w
              - sensor.total_home_generation_w
              - sensor.home_pv_surplus_w
              - sensor.home_grid_import_w
              - sensor.home_grid_export_w

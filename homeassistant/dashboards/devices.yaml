title: Geraete
views:
  - title: Geraete
    path: geraete
    icon: mdi:devices
    type: sections
    max_columns: 3
    badges:
      - entity: cover.meross_garage_door
      - entity: switch.pc_steckdose_1
      - entity: sensor.pc_leistung
    sections:
      - type: grid
        cards:
          - type: markdown
            content: >
              ## Geraete

              Garage, Steckdose, Balkon-PV und Waermepumpe liegen hier in einer
              ruhigen Bedienseite mit klaren Schnellaktionen.
          - type: heading
            heading: Schnellzugriff
          - type: button
            name: Garagentor oeffnen
            icon: mdi:garage-open
            entity: cover.meross_garage_door
            tap_action:
              action: call-service
              service: cover.open_cover
              target:
                entity_id: cover.meross_garage_door
          - type: button
            name: SmartLife Steckdose
            icon: mdi:power-socket-eu
            entity: switch.pc_steckdose_1
            tap_action:
              action: toggle
          - type: button
            name: Balkon PV
            icon: mdi:solar-power-variant
            entity: sensor.fnpaf5n02h_ausgangsleistung
            tap_action:
              action: more-info
          - type: button
            name: Waermepumpe
            icon: mdi:heat-pump
            entity: sensor.1_warmepumpe_wasser_leistung
            tap_action:
              action: more-info
      - type: grid
        cards:
          - type: heading
            heading: Status
          - type: entities
            entities:
              - entity: cover.meross_garage_door
                name: Meross Garagentor
              - entity: switch.pc_steckdose_1
                name: SmartLife Steckdose
              - entity: sensor.pc_leistung
                name: SmartLife Leistung
              - entity: sensor.1_warmepumpe_wasser_leistung
                name: Waermepumpe
              - entity: binary_sensor.solarman_inverter_connection
                name: Solarman Verbindung
              - entity: sensor.solarman_inverter_total_production
                name: Solarman Gesamtproduktion
      - type: grid
        cards:
          - type: heading
            heading: Quellenwahl
          - type: entities
            entities:
              - entity: input_select.balcony_pv_data_source
                name: Balkon PV Quelle
              - entity: input_select.smartlife_data_source
                name: SmartLife Quelle
              - entity: input_select.meross_garage_data_source
                name: Meross Quelle
              - entity: select.solarman_inverter_cloud
                name: Solarman Cloud
              - entity: input_select.growatt_data_source
                name: Growatt Quelle

services:
  homeassistant:
    image: ${HA_IMAGE:-ghcr.io/home-assistant/home-assistant:stable}
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    # Host networking keeps mDNS, SSDP, Shelly discovery, and other local
    # integrations working reliably on Synology.
    environment:
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ${HA_CONFIG_PATH:-/volume1/docker/homeassistant/config}:/config
